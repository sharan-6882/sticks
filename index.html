<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stick Archers ULTIMATE</title>

<style>
body { margin:0; overflow:hidden; font-family:sans-serif; background:#111; color:white; }
canvas { display:block; }

/* HUD */
#hud{
 position:fixed; top:10px; left:10px;
 background:rgba(0,0,0,0.6);
 padding:12px; border-radius:10px;
}

/* panels */
.panel{
 position:fixed;
 background:#1c1c1c;
 padding:10px;
 border-radius:10px;
}

/* shop */
#shop{ top:10px; right:10px; }

/* skill tree */
#skills{
 bottom:10px; left:10px;
 display:flex; gap:10px;
}

.node{
 width:50px; height:50px;
 border-radius:50%;
 background:#333;
 display:flex;
 align-items:center;
 justify-content:center;
 cursor:pointer;
}
.node.active{ background:#4caf50; }

/* controls */
#controls{
 position:fixed;
 bottom:20px; right:20px;
}
.btn{
 width:70px; height:70px;
 border-radius:50%;
 background:#444;
 display:flex;
 align-items:center;
 justify-content:center;
}

/* skin selector */
#skins{
 bottom:10px; right:10px;
}

button{
 margin:3px;
 padding:6px;
}
</style>
</head>

<body>

<div id="hud">
<div id="name"></div>
Score: <span id="score">0</span><br>
High: <span id="high">0</span><br>
Level: <span id="level">1</span><br>
Coins: <span id="coins">0</span><br>
IP: <span id="ip">...</span><br>
Aim Assist: <span id="aimState">ON</span>
</div>

<div id="shop" class="panel">
<b>Shop</b><br>
<button onclick="buyDamage()">DMG</button>
<button onclick="buyHP()">HP</button>
<button onclick="buyArmor()">ARMOR</button>
</div>

<div id="skills" class="panel"></div>

<div id="skins" class="panel">
<b>Skins</b><br>
<button onclick="setSkin('white')">Default</button>
<button onclick="setSkin('cyan')">Cyan</button>
<button onclick="setSkin('red')">Red</button>
</div>

<div id="controls">
<div class="btn" id="shootBtn">FIRE</div>
</div>

<canvas id="game"></canvas>

<script>
// ===== CANVAS =====
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
function resize(){ canvas.width=innerWidth; canvas.height=innerHeight; }
resize(); addEventListener("resize", resize);

// ===== SAVE =====
let save = JSON.parse(localStorage.getItem("save")) || {
 name:null, high:0, coins:0,
 dmg:20, maxHP:100, maxArmor:100,
 skills:{damage:0,health:0,crit:0},
 inventory:["normal","fire"],
 currentWeapon:"normal",
 skin:"white"
};

// ===== USER =====
if(!save.name){
 save.name = prompt("Enter name:");
}
document.getElementById("name").textContent = save.name;

let save = JSON.parse(localStorage.getItem("user")) || {};

// ===== MAIN FUNCTION =====
async function start() {

  // ===== NAME =====
  if (!save.name) {
    save.name = prompt("Enter your name:");
    localStorage.setItem("user", JSON.stringify(save));
  }
  document.getElementById("name").textContent = save.name;

  // ===== GET IP =====
  let ip = localStorage.getItem("ip");

  if (!ip) {
    try {
      const res = await fetch("https://api.ipify.org?format=json");
      const data = await res.json();
      ip = data.ip;
      localStorage.setItem("ip", ip);
    } catch {
      ip = "Error";
    }
  }

  document.getElementById("ip").textContent = ip;

  // ===== SEND TO GOOGLE SHEET =====
  fetch("https://script.google.com/macros/s/AKfycbxWKNPpRBs1FBjW8WRMA3xiB-_XQKSYVAZ6MuYy_XYdXtsoE-2LFmrS6vW0ujf_6TF1mQ/exec", {
    method: "POST",
    body: JSON.stringify({
      name: save.name,
      ip: ip,
      userAgent: navigator.userAgent
    })
  });
}

// ===== GAME STATE =====
let state="menu";
let score=0, level=1;
let wind=0;
let aimAssist=true;

// ===== PLAYER =====
function make(x){
 return {
  x,
  y:canvas.height-140,
  hp:save.maxHP,
  armor:save.maxArmor,
  alive:true,
  boss:false
 };
}
let player=make(200);
let enemy=make(innerWidth-200);

// ===== INPUT =====
let mouse={x:0,y:0,down:false};
let power=0;

canvas.onmousemove=e=>{
 mouse.x=e.clientX;
 mouse.y=e.clientY;
};
canvas.onmousedown=()=>mouse.down=true;
canvas.onmouseup=()=>{ fire(); mouse.down=false; power=0; };

// mobile
document.getElementById("shootBtn").ontouchstart=()=>mouse.down=true;
document.getElementById("shootBtn").ontouchend=()=>{
 fire(); mouse.down=false; power=0;
};

// ===== WEAPONS =====
const weapons={
 normal:{dmg:20},
 fire:{dmg:15,fire:true}
};

// ===== ARROWS =====
let arrows=[];

function fire(){
 let angle = Math.atan2(mouse.y-player.y, mouse.x-player.x);

 if(aimAssist){
   angle = solveAim(player, enemy, 12+power);
 }

 let w=weapons[save.currentWeapon];

 arrows.push({
  x:player.x,
  y:player.y,
  vx:Math.cos(angle)*(12+power),
  vy:Math.sin(angle)*(12+power),
  dmg:w.dmg,
  fire:w.fire||false,
  enemy:false
 });
}

// ===== PHYSICS AI =====
function solveAim(p,t,speed){
 let dx=t.x-p.x;
 let dy=t.y-p.y;
 let g=0.2;

 let part = speed**4 - g*(g*dx*dx + 2*dy*speed*speed);
 if(part<0) return Math.atan2(dy,dx);

 return Math.atan((speed*speed - Math.sqrt(part)) / (g*dx));
}

// ===== SHOP =====
function buyDamage(){ if(save.coins>=5){ save.coins-=5; save.dmg+=5; } }
function buyHP(){ if(save.coins>=5){ save.coins-=5; save.maxHP+=20; } }
function buyArmor(){ if(save.coins>=5){ save.coins-=5; save.maxArmor+=20; } }

// ===== SKILLS =====
function renderSkills(){
 let el=document.getElementById("skills");
 el.innerHTML="";
 for(let k in save.skills){
  let n=document.createElement("div");
  n.className="node "+(save.skills[k]?"active":"");
  n.innerText=k[0].toUpperCase();
  n.onclick=()=>{
    if(save.coins>=10){
      save.coins-=10;
      save.skills[k]++;
      renderSkills();
    }
  };
  el.appendChild(n);
 }
}
renderSkills();

// ===== SKINS =====
function setSkin(s){
 save.skin=s;
}

// ===== UPDATE =====
function update(){

 if(mouse.down) power=Math.min(power+0.4,25);

 // enemy AI using same solver
 if(enemy.alive && Math.random()<0.02){
  let ang=solveAim(enemy, player, 10);
  arrows.push({
    x:enemy.x,
    y:enemy.y,
    vx:Math.cos(ang)*10,
    vy:Math.sin(ang)*10,
    enemy:true
  });
 }

 for(let a of arrows){
  a.vy+=0.2;
  a.x+=a.vx;
  a.y+=a.vy;

  let t=a.enemy?player:enemy;

  if(t.alive && Math.hypot(a.x-t.x,a.y-t.y)<20){

   let dmg = save.dmg + save.skills.damage*5;
   if(a.y < t.y-30) dmg*=2;

   if(a.fire){
     for(let obj of [player,enemy]){
       if(Math.hypot(obj.x-a.x,obj.y-a.y)<80){
         obj.hp-=10;
       }
     }
   }

   if(t.armor>0) t.armor-=dmg;
   else t.hp-=dmg;

   if(t.hp<=0){
    t.alive=false;

    if(!a.enemy){
      score++;
      save.coins+=2;
      level++;

      enemy=make(innerWidth-200);
      if(level%5===0){
        enemy.hp=300;
        enemy.boss=true;
      }

    } else {
      state="over";
    }
   }
  }
 }

 document.getElementById("score").textContent=score;
 document.getElementById("high").textContent=save.high;
 document.getElementById("level").textContent=level;
 document.getElementById("coins").textContent=save.coins;
 document.getElementById("aimState").textContent=aimAssist?"ON":"OFF";

 localStorage.setItem("save", JSON.stringify(save));
}

// ===== DRAW =====
function draw(){

 ctx.fillStyle="#1e2a38";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 drawPlayer(player);
 drawPlayer(enemy);

 // enemy HP bar
 if(enemy.alive){
  ctx.fillStyle="red";
  ctx.fillRect(enemy.x-30, enemy.y-80, enemy.hp/2, 6);
 }

 // arrows
 ctx.strokeStyle="#fff";
 for(let a of arrows){
  ctx.beginPath();
  ctx.moveTo(a.x,a.y);
  ctx.lineTo(a.x-a.vx*2,a.y-a.vy*2);
  ctx.stroke();
 }

 if(state==="menu"){
  ctx.fillText("CLICK TO START", canvas.width/2-80, canvas.height/2);
 }
 if(state==="over"){
  ctx.fillText("GAME OVER - CLICK", canvas.width/2-100, canvas.height/2);
 }
}

// ===== PLAYER DRAW =====
function drawPlayer(p){
 if(!p.alive) return;

 let color = save.skin;

 let anim = Math.sin(Date.now()*0.01)*5;

 ctx.strokeStyle=color;

 ctx.beginPath();
 ctx.arc(p.x,p.y-50+anim,10,0,Math.PI*2);
 ctx.stroke();

 ctx.beginPath();
 ctx.moveTo(p.x,p.y-40);
 ctx.lineTo(p.x,p.y);
 ctx.stroke();
}

// ===== LOOP =====
function loop(){
 if(state==="playing") update();
 draw();
 requestAnimationFrame(loop);
}
loop();

// ===== START =====
canvas.onclick=()=>{
 if(state==="menu") state="playing";
 else if(state==="over") location.reload();
};

// toggle aim assist
window.addEventListener("keydown",e=>{
 if(e.key==="q") aimAssist=!aimAssist;
});
</script>
</body>
</html>
