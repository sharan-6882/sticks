<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate Ragdoll Archers</title>

<style>
body{
margin:0;
overflow:hidden;
background:#0b0b0b;
color:white;
font-family:Arial;
}

#ui{
position:absolute;
top:10px;
left:10px;
font-size:18px;
}

canvas{
display:block;
}
</style>
</head>

<body>

<div id="ui">
❤️ Lives: <span id="lives">5</span><br>
🎯 Level: <span id="level">1</span><br>
🏆 Score: <span id="score">0</span>
</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let gravity=0.22
let arrows=[]
let enemies=[]
let particles=[]

let level=1
let score=0
let lives=5

let aimX=0
let aimY=0
let power=0
let charging=false

class Fighter{

constructor(x,y,enemy=false){
this.x=x
this.y=y
this.enemy=enemy
this.hp=100
this.cool=120
}

draw(){

ctx.strokeStyle=this.enemy?"red":"white"
ctx.lineWidth=4

ctx.beginPath()
ctx.arc(this.x,this.y-40,10,0,Math.PI*2)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(this.x,this.y-30)
ctx.lineTo(this.x,this.y)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(this.x,this.y-20)
ctx.lineTo(this.x-20,this.y-5)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(this.x,this.y-20)
ctx.lineTo(this.x+20,this.y-5)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(this.x,this.y)
ctx.lineTo(this.x-15,this.y+30)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(this.x,this.y)
ctx.lineTo(this.x+15,this.y+30)
ctx.stroke()

}

update(){

if(!this.enemy) return

this.cool--

if(this.cool<=0){

shootEnemy(this)

this.cool=120+Math.random()*80

}

}

}

class Arrow{

constructor(x,y,vx,vy,enemy=false){
this.x=x
this.y=y
this.vx=vx
this.vy=vy
this.enemy=enemy
this.explode=Math.random()<0.15
}

update(){

this.vy+=gravity
this.x+=this.vx
this.y+=this.vy

if(this.enemy){

let d=Math.hypot(player.x-this.x,player.y-this.y)

if(d<25){

damagePlayer()

if(this.explode) explode(this.x,this.y)

return true
}

}else{

for(let e of enemies){

let head=Math.hypot(e.x-this.x,e.y-40-this.y)

if(head<10){

e.hp-=80
blood(this.x,this.y)
killEnemy(e)

return true
}

let body=Math.hypot(e.x-this.x,e.y-this.y)

if(body<20){

e.hp-=40
blood(this.x,this.y)
killEnemy(e)

return true
}

}

}

if(this.y>canvas.height){

if(this.explode) explode(this.x,this.y)

return true
}

return false

}

draw(){

ctx.strokeStyle=this.explode?"orange":"yellow"

ctx.beginPath()
ctx.moveTo(this.x,this.y)
ctx.lineTo(this.x-this.vx*2,this.y-this.vy*2)
ctx.stroke()

}

}

function shootEnemy(e){

let dx=player.x-e.x
let dy=player.y-e.y

let dist=Math.sqrt(dx*dx+dy*dy)

let speed=11

let vx=dx/dist*speed
let vy=dy/dist*speed - dist*0.01

arrows.push(new Arrow(e.x,e.y-20,vx,vy,true))

}

function damagePlayer(){

lives--

document.getElementById("lives").innerText=lives

if(lives<=0){

alert("Game Over")
location.reload()

}

}

function killEnemy(e){

if(e.hp<=0){

score+=10

document.getElementById("score").innerText=score

enemies.splice(enemies.indexOf(e),1)

}

}

function blood(x,y){

for(let i=0;i<10;i++){

particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:30
})

}

}

function explode(x,y){

for(let i=0;i<30;i++){

particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)*8,
vy:(Math.random()-0.5)*8,
life:40
})

}

}

function spawnEnemies(){

enemies=[]

let count=level+1

for(let i=0;i<count;i++){

let x=canvas.width-200-Math.random()*400
let y=canvas.height-100-Math.random()*200

enemies.push(new Fighter(x,y,true))

}

document.getElementById("level").innerText=level

}

let player=new Fighter(150,canvas.height-100,false)

spawnEnemies()

canvas.onmousedown=()=>{

charging=true
power=0

}

canvas.onmouseup=()=>{

charging=false

let angle=Math.atan2(aimY-player.y,aimX-player.x)

let vx=Math.cos(angle)*power
let vy=Math.sin(angle)*power

arrows.push(new Arrow(player.x,player.y-20,vx,vy,false))

}

canvas.onmousemove=e=>{

aimX=e.clientX
aimY=e.clientY

}

canvas.ontouchstart=e=>{

charging=true
power=0

}

canvas.ontouchend=e=>{

charging=false

let angle=Math.atan2(aimY-player.y,aimX-player.x)

arrows.push(new Arrow(player.x,player.y-20,Math.cos(angle)*power,Math.sin(angle)*power,false))

}

canvas.ontouchmove=e=>{

aimX=e.touches[0].clientX
aimY=e.touches[0].clientY

}

function update(){

if(charging){

power+=0.25
if(power>18) power=18

}

for(let e of enemies) e.update()

arrows=arrows.filter(a=>!a.update())

particles=particles.filter(p=>{

p.x+=p.vx
p.y+=p.vy
p.life--

return p.life>0

})

if(enemies.length==0){

level++
spawnEnemies()

}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#1a1a1a"
ctx.fillRect(0,canvas.height-60,canvas.width,60)

player.draw()

for(let e of enemies) e.draw()

for(let a of arrows) a.draw()

for(let p of particles){

ctx.fillStyle="red"
ctx.fillRect(p.x,p.y,3,3)

}

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
