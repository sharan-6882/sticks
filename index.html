<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate Ragdoll Archers</title>

<style>

body{
margin:0;
overflow:hidden;
background:linear-gradient(#7ec0ee,#3fa34d);
font-family:sans-serif;
}

canvas{
display:block;
touch-action:none;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
}

.bar{
width:160px;
height:12px;
background:#333;
margin-bottom:5px;
}

.hp{
height:100%;
background:red;
}

</style>
</head>

<body>

<div id="ui">

LEVEL: <span id="level">1</span><br><br>

PLAYER
<div class="bar"><div id="php" class="hp"></div></div>

ENEMIES LEFT: <span id="enemycount">1</span>

</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}
resize()
window.addEventListener("resize",resize)

let gravity=0.4
let arrows=[]
let level=1

class Arrow{

constructor(x,y,vx,vy,owner){
this.x=x
this.y=y
this.vx=vx
this.vy=vy
this.owner=owner
this.stuck=false
}

update(){

if(this.stuck) return

this.vy+=gravity
this.x+=this.vx
this.y+=this.vy

}

draw(){

ctx.beginPath()
ctx.moveTo(this.x,this.y)
ctx.lineTo(this.x-this.vx*4,this.y-this.vy*4)
ctx.strokeStyle="brown"
ctx.lineWidth=4
ctx.stroke()

}

}

class Fighter{

constructor(x,color){

this.x=x
this.y=0
this.color=color
this.health=100
this.alive=true

}

update(){
this.y=canvas.height-220
}

draw(){

if(!this.alive) return

let x=this.x
let y=this.y

ctx.strokeStyle=this.color
ctx.lineWidth=6

// head
ctx.beginPath()
ctx.arc(x,y-20,12,0,Math.PI*2)
ctx.stroke()

// body
ctx.beginPath()
ctx.moveTo(x,y)
ctx.lineTo(x,y+60)
ctx.stroke()

// arms
ctx.beginPath()
ctx.moveTo(x,y+10)
ctx.lineTo(x-30,y+30)
ctx.moveTo(x,y+10)
ctx.lineTo(x+30,y+30)
ctx.stroke()

// legs
ctx.beginPath()
ctx.moveTo(x,y+60)
ctx.lineTo(x-25,y+100)
ctx.moveTo(x,y+60)
ctx.lineTo(x+25,y+100)
ctx.stroke()

}

}

let player=new Fighter(150,"blue")
let enemies=[]

function spawnEnemies(){

enemies=[]

let count=level+1

for(let i=0;i<count;i++){

let spacing=canvas.width/(count+1)
let x=spacing*(i+1)

if(x<250) x+=250

enemies.push(new Fighter(x,"red"))

}

document.getElementById("enemycount").innerText=enemies.length

}

spawnEnemies()

let aiming=false
let aimX=0
let aimY=0

function shoot(px,py){

let dx=px-player.x
let dy=py-player.y

let power=0.16

arrows.push(new Arrow(player.x,player.y,dx*power,dy*power,"player"))

}

canvas.addEventListener("mousedown",e=>{
aiming=true
aimX=e.clientX
aimY=e.clientY
})

canvas.addEventListener("mousemove",e=>{
if(aiming){
aimX=e.clientX
aimY=e.clientY
}
})

canvas.addEventListener("mouseup",()=>{
shoot(aimX,aimY)
aiming=false
})

canvas.addEventListener("touchstart",e=>{
aiming=true
let t=e.touches[0]
aimX=t.clientX
aimY=t.clientY
})

canvas.addEventListener("touchmove",e=>{
let t=e.touches[0]
aimX=t.clientX
aimY=t.clientY
})

canvas.addEventListener("touchend",()=>{
shoot(aimX,aimY)
aiming=false
})

function enemyShoot(enemy){

if(!enemy.alive) return

let dx=(player.x-enemy.x)+(Math.random()*120-60)
let dy=(player.y-enemy.y)+(Math.random()*120-60)

let power=0.12

arrows.push(new Arrow(enemy.x,enemy.y,dx*power,dy*power,"enemy"))

}

setInterval(()=>{

for(let e of enemies){
enemyShoot(e)
}

},3000)

function hitCheck(a){

// enemies hit
if(a.owner==="player"){

for(let e of enemies){

if(!e.alive) continue

if(Math.abs(a.x-e.x)<12 && Math.abs(a.y-(e.y-20))<12){

e.health-=30
a.stuck=true

}

else if(Math.abs(a.x-e.x)<25 && Math.abs(a.y-e.y)<60){

e.health-=12
a.stuck=true

}

if(e.health<=0){
e.alive=false
}

}

}

// player hit
if(a.owner==="enemy"){

if(Math.abs(a.x-player.x)<12 && Math.abs(a.y-(player.y-20))<12){

player.health-=20
a.stuck=true

}

else if(Math.abs(a.x-player.x)<25 && Math.abs(a.y-player.y)<60){

player.health-=8
a.stuck=true

}

}

}

function nextLevel(){

level++
player.health=300
arrows=[]

spawnEnemies()

document.getElementById("level").innerText=level

}

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height)

player.update()
player.draw()

for(let e of enemies){

e.update()
e.draw()

}

if(aiming){

ctx.beginPath()
ctx.moveTo(player.x,player.y)
ctx.lineTo(aimX,aimY)
ctx.strokeStyle="white"
ctx.lineWidth=2
ctx.stroke()

}

for(let a of arrows){

a.update()
a.draw()
hitCheck(a)

}

let alive=enemies.filter(e=>e.alive).length

document.getElementById("enemycount").innerText=alive
document.getElementById("php").style.width=player.health+"%"

if(alive===0){
setTimeout(nextLevel,800)
}

if(player.health<=0){

alert("Game Over! Level reached: "+level)
location.reload()

}

requestAnimationFrame(update)

}

update()

</script>

</body>
</html>
