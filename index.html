
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate Ragdoll Archers</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<style>
body{margin:0;overflow:hidden;background:#111}
canvas{display:block}
#ui{
position:absolute;
left:10px;
top:10px;
color:white;
font-family:Arial
}
</style>

</head>

<body>

<div id="ui">
❤️ Lives: <span id="lives">5</span><br>
🎯 Level: <span id="level">1</span>
</div>

<script>

const Engine = Matter.Engine
const Render = Matter.Render
const World = Matter.World
const Bodies = Matter.Bodies
const Constraint = Matter.Constraint
const Body = Matter.Body
const Events = Matter.Events

let engine = Engine.create()
let world = engine.world

let render = Render.create({
 element:document.body,
 engine:engine,
 options:{
 width:window.innerWidth,
 height:window.innerHeight,
 wireframes:false,
 background:'#111'
 }
})

Render.run(render)
Engine.run(engine)

let lives=5
let level=1
let arrows=[]
let enemies=[]

let ground = Bodies.rectangle(
 window.innerWidth/2,
 window.innerHeight-20,
 window.innerWidth,
 40,
 {isStatic:true,render:{fillStyle:'#333'}}
)

World.add(world,ground)

function createRagdoll(x,y,color){

let head = Bodies.circle(x,y-60,12,{render:{fillStyle:color}})
let body = Bodies.rectangle(x,y-20,20,40,{render:{fillStyle:color}})
let leg1 = Bodies.rectangle(x-8,y+30,8,40,{render:{fillStyle:color}})
let leg2 = Bodies.rectangle(x+8,y+30,8,40,{render:{fillStyle:color}})
let arm1 = Bodies.rectangle(x-20,y-20,30,6,{render:{fillStyle:color}})
let arm2 = Bodies.rectangle(x+20,y-20,30,6,{render:{fillStyle:color}})

let neck = Constraint.create({bodyA:head,bodyB:body,stiffness:0.6})
let hip1 = Constraint.create({bodyA:body,bodyB:leg1,stiffness:0.6})
let hip2 = Constraint.create({bodyA:body,bodyB:leg2,stiffness:0.6})
let shoulder1 = Constraint.create({bodyA:body,bodyB:arm1,stiffness:0.6})
let shoulder2 = Constraint.create({bodyA:body,bodyB:arm2,stiffness:0.6})

World.add(world,[head,body,leg1,leg2,arm1,arm2,neck,hip1,hip2,shoulder1,shoulder2])

return {head,body,leg1,leg2,arm1,arm2}
}

let player = createRagdoll(200,400,'white')

function spawnEnemies(){

for(let e of enemies){
World.remove(world,e.head)
World.remove(world,e.body)
}

enemies=[]

let count = level+1

for(let i=0;i<count;i++){
let enemy = createRagdoll(
window.innerWidth-200-(i*120),
400-(i%3)*80,
'red'
)

enemies.push(enemy)
}

}

spawnEnemies()

function shootArrow(x,y,forceX,forceY,enemy=false){

let arrow = Bodies.rectangle(x,y,40,4,{
 density:0.002,
 frictionAir:0.001,
 render:{fillStyle:'yellow'}
})

Body.setVelocity(arrow,{x:forceX,y:forceY})

arrow.enemy=enemy

World.add(world,arrow)
arrows.push(arrow)

}

let charging=false
let mouse={x:0,y:0}

// Mouse Controls
window.addEventListener('mousedown',()=>charging=true)
window.addEventListener('mouseup',()=>{
charging=false

let dx = mouse.x-player.head.position.x
let dy = mouse.y-player.head.position.y

shootArrow(
player.head.position.x,
player.head.position.y,
dx*0.05,
dy*0.05
)

})

window.addEventListener('mousemove',e=>{
mouse.x=e.clientX
mouse.y=e.clientY
})

// Touchscreen Controls
window.addEventListener('touchstart',(e)=>{
charging=true
mouse.x=e.touches[0].clientX
mouse.y=e.touches[0].clientY
})

window.addEventListener('touchmove',(e)=>{
mouse.x=e.touches[0].clientX
mouse.y=e.touches[0].clientY
})

window.addEventListener('touchend',()=>{
charging=false

let dx = mouse.x-player.head.position.x
let dy = mouse.y-player.head.position.y

shootArrow(
player.head.position.x,
player.head.position.y,
dx*0.05,
dy*0.05
)

})

setInterval(()=>{

for(let e of enemies){

let dx = player.head.position.x-e.head.position.x
let dy = player.head.position.y-e.head.position.y

shootArrow(
e.head.position.x,
e.head.position.y,
dx*0.04,
dy*0.04,
true
)

}

},2500)

Events.on(engine,'collisionStart',function(e){

for(let pair of e.pairs){

let a=pair.bodyA
let b=pair.bodyB

if(arrows.includes(a)||arrows.includes(b)){

let arrow = arrows.includes(a)?a:b

if(arrow.enemy){

if(pair.bodyA===player.head||pair.bodyB===player.head){

lives--
document.getElementById('lives').innerText=lives

if(lives<=0){
alert('Game Over')
location.reload()
}

}

}else{

for(let e of enemies){

if(pair.bodyA===e.head||pair.bodyB===e.head){
World.remove(world,e.head)
}

}

}

}

}

})

function checkWin(){

if(enemies.every(e=>!world.bodies.includes(e.head))){
level++
document.getElementById('level').innerText=level
spawnEnemies()
}

}

setInterval(checkWin,1000)

</script>

</body>
</html>
```
